name: CI/CD

on:
  push:
    branches: ['main', 'master']
  pull_request:
    branches: ['main', 'master']

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci
        working-directory: .

      - name: Lint
        run: npm run lint
        working-directory: .

      - name: Type check
        run: npm run typecheck
        working-directory: .

      - name: Test
        run: npm test -- --runInBand
        working-directory: .

      - name: Build
        run: npm run build
        working-directory: .

      - name: Install web dependencies
        run: npm ci
        working-directory: ui/web

      - name: Type check web
        run: npm run typecheck
        working-directory: ui/web

      - name: Build web
        run: npm run build
        working-directory: ui/web

      - name: Install dashboard dependencies
        run: npm ci
        working-directory: ui/web/dashboard

      - name: Build dashboard
        run: npm run build
        working-directory: ui/web/dashboard
